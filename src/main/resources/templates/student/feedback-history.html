<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Feedback History – InternPortal</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" th:href="@{/css/sidebar.css}">
  <link rel="stylesheet" th:href="@{/css/animations.css}">
  <link rel="stylesheet" th:href="@{/css/feedback.css}">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/sidebar-student :: sidebar('feedback-history')}"></div>
<div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>
<div class="main-content">
  <header class="top-header">
    <button onclick="toggleSidebar()" id="menuBtn" style="background:none;border:none;color:var(--text-secondary);font-size:1.2rem;cursor:pointer;font-size:1.2rem;">☰</button>
    <div class="header-title gradient-text">📝 Feedback History</div>
  </header>
  <div class="page-content page-enter">
    <div class="page-subtitle" style="margin-bottom:24px;" th:text="${#lists.size(history)} + ' entries'"></div>

    <div th:if="${#lists.isEmpty(history)}" style="text-align:center;padding:80px;color:var(--text-muted);">
      <div style="font-size:4rem;margin-bottom:16px;">📝</div>
      <div>No feedback submitted yet.</div>
    </div>

    <div th:each="fb, iter : ${history}" class="history-item fade-in"
         th:style="'animation-delay:' + ${iter.index * 0.04} + 's'">
      <div class="history-date" th:text="${#temporals.format(fb.feedbackDate,'EEEE, dd MMMM yyyy')}"></div>
      <div class="history-title">📌 Work Summary</div>
      <div class="history-body" th:text="${fb.workDone}" style="margin-bottom:10px;"></div>
      <div class="history-title">✅ Tasks Completed</div>
      <div class="history-body" th:text="${fb.dailyFeedback}"></div>
      <div th:if="${fb.additionalNotes != null and !fb.additionalNotes.isEmpty()}" style="margin-top:10px;">
        <div class="history-title">💡 Notes</div>
        <div class="history-body" th:text="${fb.additionalNotes}"></div>
      </div>
    </div>
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body></html>
