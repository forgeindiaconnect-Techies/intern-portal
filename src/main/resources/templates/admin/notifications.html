<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Notifications - InternPortal Admin</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" th:href="@{/css/sidebar.css}">
  <link rel="stylesheet" th:href="@{/css/animations.css}">
  <link rel="stylesheet" th:href="@{/css/feedback.css}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/sidebar-admin :: sidebar('notifications')}"></div>
<div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>
<div class="main-content">
  <header class="top-header">
    <button onclick="toggleSidebar()" id="menuBtn" class="menu-button"><i class="fas fa-bars"></i></button>
    <div class="header-title">Notifications</div>
    <div class="header-actions">
      <form th:action="@{/admin/notifications/read-all}" method="post">
        <button type="submit" class="btn-outline-glow" style="font-size:.82rem;padding:7px 16px;">Mark All Read</button>
      </form>
    </div>
  </header>
  <div class="page-content page-enter">
    <div class="page-title" style="margin-bottom:6px;">All Notifications</div>
    <div class="page-subtitle" style="margin-bottom:24px;" th:text="${#lists.size(notifications)} + ' notifications'"></div>

    <div th:if="${#lists.isEmpty(notifications)}" style="text-align:center;padding:80px;color:var(--text-muted);">
      <i class="fas fa-bell-slash" style="font-size:2rem;margin-bottom:16px;color:var(--accent);"></i>
      <div style="font-size:1.1rem;">No notifications yet</div>
    </div>

    <a th:each="notif,i : ${notifications}" class="notif-page-item notification-link fade-in"
       th:href="@{/admin/notifications/open/{id}(id=${notif.id})}"
       th:classappend="${!notif.read} ? 'unread' : ''"
       th:style="'animation-delay:' + ${i.index * 0.05} + 's'">
      <div style="width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.05rem;flex-shrink:0;"
           th:style="${!notif.read} ? 'background:rgba(245,197,66,.15);' : 'background:rgba(255,255,255,.05);'">
        <i class="fas fa-bell"></i>
      </div>
      <div style="flex:1;min-width:0;">
        <div style="font-weight:700;font-size:.9rem;margin-bottom:4px;" th:text="${notif.title}"></div>
        <div style="font-size:.83rem;color:var(--text-secondary);" th:text="${notif.message}"></div>
        <div style="font-size:.73rem;color:var(--text-muted);margin-top:6px;" th:text="${#temporals.format(notif.createdAt,'dd MMM yyyy - HH:mm')}"></div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;">
        <span th:if="${!notif.read}" style="background:rgba(245,197,66,.18);color:var(--accent);font-size:.68rem;font-weight:700;padding:3px 10px;border-radius:20px;">NEW</span>
        <span style="color:var(--text-muted);font-size:.75rem;">Open</span>
      </div>
    </a>
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body></html>
