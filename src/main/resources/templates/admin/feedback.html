<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Feedback - InternPortal Admin</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" th:href="@{/css/sidebar.css}">
  <link rel="stylesheet" th:href="@{/css/animations.css}">
  <link rel="stylesheet" th:href="@{/css/feedback.css}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/sidebar-admin :: sidebar('feedback')}"></div>
<div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>
<div class="main-content">
  <header class="top-header">
    <button onclick="toggleSidebar()" id="menuBtn" class="menu-button"><i class="fas fa-bars"></i></button>
    <div class="header-title">Feedback Management</div>
    <div class="header-actions">
      <a th:href="@{/admin/notifications}" class="header-btn"><i class="fas fa-bell"></i><span class="notif-dot" th:if="${unreadCount > 0}"></span></a>
    </div>
  </header>
  <div class="page-content page-enter">
    <section class="dashboard-hero" style="margin-bottom:22px;">
      <div>
        <div class="eyebrow">Student feedback</div>
        <h1>Review daily submissions</h1>
        <p th:text="${feedbackToday} + ' submissions today - ' + ${#lists.size(feedbackList)} + ' total'">0 submissions today - 0 total</p>
      </div>
    </section>

    <div class="glass-card p-3 mb-4" style="display:flex;gap:12px;align-items:center;">
      <i class="fas fa-search" style="color:var(--text-muted);"></i>
      <input type="text" placeholder="Search by student name or content..." oninput="filterTable(this.value,'fbTable')"
             style="background:none;border:none;outline:none;color:var(--text-primary);flex:1;font-size:.9rem;">
    </div>

    <div class="glass-card" th:if="${#lists.isEmpty(feedbackList)}" style="text-align:center;padding:60px;color:var(--text-muted);">
      <i class="fas fa-message" style="font-size:2rem;margin-bottom:12px;color:var(--accent);"></i>
      <div>No feedback submitted yet</div>
    </div>

    <div class="glass-card" th:if="${!#lists.isEmpty(feedbackList)}">
      <div class="table-responsive">
        <table class="table table-dark-glass" id="fbTable">
          <thead>
          <tr><th>Student</th><th>Date</th><th>Work Done</th><th>Daily Feedback</th><th>Notes</th></tr>
          </thead>
          <tbody>
          <tr th:each="fb : ${feedbackList}" th:id="'feedback-' + ${fb.id}" class="fade-in feedback-target-row">
            <td>
              <div style="display:flex;align-items:center;gap:10px;">
                <div class="avatar-circle" style="width:36px;height:36px;font-size:.75rem;">
                  <i class="fas fa-user"></i>
                </div>
                <div>
                  <div style="font-weight:700;" th:text="${fb.user.fullName}">Student</div>
                  <div style="font-size:.75rem;color:var(--text-muted);" th:text="${fb.user.college != null ? fb.user.college : 'No college listed'}"></div>
                </div>
              </div>
            </td>
            <td style="white-space:nowrap;" th:text="${#temporals.format(fb.feedbackDate,'dd MMM yyyy')}"></td>
            <td style="max-width:240px;"><div th:text="${fb.workDone}" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></div></td>
            <td style="max-width:240px;"><div th:text="${fb.dailyFeedback}" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></div></td>
            <td style="color:var(--text-muted);font-size:.82rem;" th:text="${fb.additionalNotes != null && !fb.additionalNotes.isEmpty() ? fb.additionalNotes : '-'}"></td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
<script>
function filterTable(q,id){
  document.querySelectorAll('#'+id+' tbody tr').forEach(r=>{
    r.style.display = r.textContent.toLowerCase().includes(q.toLowerCase()) ? '' : 'none';
  });
}
</script>
</body>
</html>
