<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Student - InternPortal</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" th:href="@{/css/sidebar.css}">
  <link rel="stylesheet" th:href="@{/css/animations.css}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/sidebar-admin :: sidebar('students')}"></div>
<div class="main-content">
  <header class="top-header">
    <div class="header-title">Add New Student</div>
    <div class="header-actions">
      <a th:href="@{/admin/students}" class="btn-outline-glow"><i class="fas fa-arrow-left"></i> Back</a>
    </div>
  </header>
  <div class="page-content page-enter">
    <div class="alert-glass error" th:if="${error}" th:text="${error}"></div>
    <div style="max-width:700px;margin:0 auto;">
      <div class="glass-card p-4">
        <h5 style="color:var(--text-primary);margin-bottom:24px;font-weight:700;">Student Information</h5>
        <form th:action="@{/admin/students/add}" method="post" enctype="multipart/form-data">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
            <div>
              <label class="form-label-dark">First Name</label>
              <input type="text" name="firstName" class="form-control-dark w-100" required placeholder="John">
            </div>
            <div>
              <label class="form-label-dark">Last Name</label>
              <input type="text" name="lastName" class="form-control-dark w-100" required placeholder="Doe">
            </div>
            <div>
              <label class="form-label-dark">Username</label>
              <input type="text" name="username" class="form-control-dark w-100" required placeholder="john.doe">
            </div>
            <div>
              <label class="form-label-dark">Email</label>
              <input type="email" name="email" class="form-control-dark w-100" required placeholder="john@example.com">
            </div>
            <div>
              <label class="form-label-dark">Password</label>
              <input type="password" name="password" class="form-control-dark w-100" required placeholder="Min 6 characters">
            </div>
            <div>
              <label class="form-label-dark">Phone</label>
              <input type="tel" name="phone" class="form-control-dark w-100" placeholder="+91 9876543210">
            </div>
            <div>
              <label class="form-label-dark">College</label>
              <input type="text" name="college" class="form-control-dark w-100" placeholder="IIT Madras">
            </div>
            <div>
              <label class="form-label-dark">Department</label>
              <input type="text" name="department" class="form-control-dark w-100" placeholder="Computer Science">
            </div>
            <div>
              <label class="form-label-dark">Year</label>
              <select name="year" class="form-control-dark w-100">
                <option value="">Select Year</option>
                <option>1st Year</option><option>2nd Year</option>
                <option>3rd Year</option><option>4th Year</option>
              </select>
            </div>
          </div>
          <div style="margin-top:28px;display:flex;gap:12px;">
            <button type="submit" class="btn-gradient">
              <i class="fas fa-user-plus"></i> Create Student Account
            </button>
            <a th:href="@{/admin/students}" class="btn-outline-glow">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
