<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Something went wrong - InternPortal</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    .error-page {
      align-items: center;
      background: radial-gradient(circle at 20% 20%, rgba(245,197,66,.12), transparent 35%),
                  radial-gradient(circle at 80% 75%, rgba(245,158,11,.08), transparent 35%),
                  var(--bg-dark);
      display: flex;
      min-height: 100vh;
      padding: 24px;
      justify-content: center;
    }
    .error-card {
      background: rgba(255,255,255,.065);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 22px;
      box-shadow: 0 28px 80px rgba(0,0,0,.4);
      max-width: 560px;
      overflow: hidden;
      padding: 34px;
      text-align: center;
      width: 100%;
    }
    .error-strip {
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      height: 5px;
      margin: -34px -34px 28px;
    }
    .error-icon {
      align-items: center;
      background: rgba(245,197,66,.12);
      border: 1px solid rgba(245,197,66,.28);
      border-radius: 18px;
      color: var(--gold);
      display: inline-flex;
      font-size: 1.6rem;
      height: 64px;
      justify-content: center;
      margin-bottom: 18px;
      width: 64px;
    }
    .error-card h1 {
      color: var(--text-primary);
      font-size: 1.5rem;
      font-weight: 900;
      margin-bottom: 10px;
    }
    .error-card p {
      color: var(--text-secondary);
      font-size: .92rem;
      line-height: 1.6;
      margin-bottom: 22px;
    }
    .error-meta {
      color: var(--text-muted);
      font-size: .78rem;
      margin-bottom: 22px;
    }
    .error-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }
    .error-actions a {
      text-decoration: none;
    }
  </style>
</head>
<body>
<main class="error-page">
  <section class="error-card">
    <div class="error-strip"></div>
    <div class="error-icon"><i class="fas fa-triangle-exclamation"></i></div>
    <h1>We could not open this page</h1>
    <p>The portal hit an unexpected issue while loading this screen. Go back to your dashboard and try again.</p>
    <div class="error-meta">
      Status <span th:text="${status}">500</span>
      <span th:if="${error}"> - </span>
      <span th:if="${error}" th:text="${error}">Error</span>
    </div>
    <div class="error-actions">
      <a class="btn-gradient" th:href="@{/}"><i class="fas fa-house"></i> Home</a>
      <a class="btn-outline-glow" href="javascript:history.back()">Go Back</a>
    </div>
  </section>
</main>
</body>
</html>
